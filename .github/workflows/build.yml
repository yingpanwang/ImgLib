name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── 框架依赖 ──
          - os: windows-latest
            rid: win-x64
            name: win-x64-framework
            self_contained: false
            aot: false
          - os: macos-14
            rid: osx-arm64
            name: osx-arm64-framework
            self_contained: false
            aot: false
          # ── AOT 独立包 ──
          - os: windows-latest
            rid: win-x64
            name: win-x64-aot
            self_contained: true
            aot: true
          - os: macos-14
            rid: osx-arm64
            name: osx-arm64-aot
            self_contained: true
            aot: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ImgLib.UI/ImgLib.UI.csproj -r ${{ matrix.rid }}

      - name: Publish (Framework-dependent)
        if: ${{ matrix.self_contained == false && matrix.aot == false }}
        run: >
          dotnet publish ImgLib.UI/ImgLib.UI.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:SelfContained=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish (AOT)
        if: ${{ matrix.aot == true }}
        run: >
          dotnet publish ImgLib.UI/ImgLib.UI.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:PublishAot=true
          -p:PublishTrimmed=true
          -p:TrimMode=partial
          -p:IsAotCompatible=true
          -p:PublishReadyToRun=false
          -p:InvariantGlobalization=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:EventSourceSupport=false
          -p:EnableUnsafeBinaryFormatterSerialization=false
          -p:JsonSerializerIsReflectionEnabledByDefault=false

      - name: Upload artifact (Framework-dependent)
        if: ${{ matrix.aot == false }}
        uses: actions/upload-artifact@v4
        with:
          name: ImgLib-${{ matrix.name }}
          path: ImgLib.UI/bin/Release/net8.0/${{ matrix.rid }}/publish/
          if-no-files-found: error

      - name: Upload artifact (AOT)
        if: ${{ matrix.aot == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ImgLib-${{ matrix.name }}
          path: ImgLib.UI/bin/Release/net8.0/publish/${{ matrix.rid }}/
          if-no-files-found: error
